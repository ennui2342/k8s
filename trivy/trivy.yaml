apiVersion: v1
kind: ServiceAccount
metadata:
  name: trivy
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: trivy-reader
rules:
- apiGroups: [""]
  resources: ["pods", "nodes", "namespaces", "services", "configmaps", "replicationcontrollers"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
  verbs: ["get", "list"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: trivy-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: trivy-reader
subjects:
- kind: ServiceAccount
  name: trivy
  namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trivy-notify-script
  namespace: monitoring
data:
  notify.py: |
    import json, subprocess, os, sys

    TM_API = 'http://api.taskmgt.svc.cluster.local:8081/tasks'
    webhook = os.environ['DISCORD_WEBHOOK']

    try:
        data = json.load(open('/report/output.json'))
    except FileNotFoundError:
        print('Scan output not found — scan likely failed completely', file=sys.stderr)
        sys.exit(1)
    except Exception as e:
        print(f'Failed to parse scan output: {e}', file=sys.stderr)
        sys.exit(1)

    # Aggregate per unique image, deduplicating CVEs
    images = {}
    for resource in data.get('Resources', []):
        ns = resource.get('Namespace', 'unknown')
        kind = resource.get('Kind', 'unknown')
        name = resource.get('Name', 'unknown')
        for result in resource.get('Results', []):
            image = result.get('Target', 'unknown')
            if '(' not in image:
                continue
            vulns = result.get('Vulnerabilities') or []
            if not vulns:
                continue
            if image not in images:
                images[image] = {'critical': 0, 'high': 0, 'cves': {}, 'workloads': set()}
            images[image]['workloads'].add(f"{ns}/{kind}/{name}")
            for v in vulns:
                cve_id = v.get('VulnerabilityID', '')
                if cve_id in images[image]['cves']:
                    continue
                sev = v.get('Severity', '')
                title = v.get('Title', '')[:80]
                fixed = v.get('FixedVersion', '')
                if sev == 'CRITICAL':
                    images[image]['critical'] += 1
                elif sev == 'HIGH':
                    images[image]['high'] += 1
                note = f"{cve_id} ({sev}): {title}"
                if fixed:
                    note += f" -> fix: {fixed}"
                images[image]['cves'][cve_id] = note

    if not images:
        print('No fixable HIGH/CRITICAL CVEs found in scanned images')
        sys.exit(0)

    print(f'Vulnerabilities found in {len(images)} image(s), sending notifications...')

    # Discord summary
    lines = ['**Weekly CVE Scan** — fixable HIGH/CRITICAL vulnerabilities found', '```']
    for image, info in images.items():
        parts = []
        if info['critical']:
            parts.append(f"{info['critical']} CRITICAL")
        if info['high']:
            parts.append(f"{info['high']} HIGH")
        lines.append(f"{image}: {', '.join(parts)}")
    lines.append('```')
    message = '\n'.join(lines)[:2000]

    r = subprocess.run(
        ['curl', '-sf', '-X', 'POST', webhook,
         '-H', 'Content-Type: application/json',
         '-d', json.dumps({'username': 'k8s homelab', 'content': message})],
        capture_output=True
    )
    if r.returncode != 0:
        print('Discord notification failed', file=sys.stderr)
    else:
        print('Discord notification sent')

    # One tm task per affected image
    for image, info in images.items():
        critical = info['critical']
        high = info['high']
        priority = '!2' if critical > 0 else '!3'
        sev_parts = []
        if critical:
            sev_parts.append(f"{critical} CRITICAL")
        if high:
            sev_parts.append(f"{high} HIGH")
        sev_str = ' + '.join(sev_parts)

        title = f"Update {image} — {sev_str} fixable CVEs {priority} #devops +cli.claude-code.k8s <cli.cve-scanner"

        cve_list = list(info['cves'].values())
        notes = '\n'.join(f"* {c}" for c in cve_list[:10])
        if len(cve_list) > 10:
            notes += f"\n* ... and {len(cve_list) - 10} more CVEs"
        notes += '\n* Workloads: ' + ', '.join(sorted(info['workloads']))

        r = subprocess.run(
            ['curl', '-sf', '-X', 'POST', TM_API,
             '-H', 'Content-Type: application/json',
             '-d', json.dumps({'text': title + '\n' + notes})],
            capture_output=True
        )
        if r.returncode != 0:
            print(f'tm task creation failed for {image}', file=sys.stderr)
        else:
            resp = json.loads(r.stdout)
            print(f'tm task created for {image}:', resp.get('id', '?'))
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: trivy-cache-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
      storage: 2Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cve-scanner
  namespace: monitoring
spec:
  schedule: "0 7 * * 1"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: trivy
          restartPolicy: OnFailure
          initContainers:
          - name: scan
            image: aquasec/trivy:latest
            command:
            - /bin/sh
            - -c
            - |
              trivy kubernetes \
                --severity HIGH,CRITICAL \
                --ignore-unfixed \
                --disable-node-collector \
                --scanners vuln \
                --format json \
                --output /report/output.json \
                --quiet \
                --timeout 45m \
                --parallel 10
              cat /report/output.json
            volumeMounts:
            - name: report
              mountPath: /report
            - name: cache
              mountPath: /root/.cache/trivy
          containers:
          - name: notify
            image: alpine:latest
            env:
            - name: DISCORD_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: discord-webhook
                  key: address
            command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache --quiet curl python3
              python3 /scripts/notify.py
            volumeMounts:
            - name: report
              mountPath: /report
            - name: scripts
              mountPath: /scripts
          volumes:
          - name: report
            emptyDir: {}
          - name: scripts
            configMap:
              name: trivy-notify-script
          - name: cache
            persistentVolumeClaim:
              claimName: trivy-cache-pvc
