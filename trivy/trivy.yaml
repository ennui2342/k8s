apiVersion: v1
kind: ServiceAccount
metadata:
  name: trivy
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: trivy-reader
rules:
- apiGroups: [""]
  resources: ["pods", "nodes", "namespaces", "services", "configmaps", "replicationcontrollers"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
  verbs: ["get", "list"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: trivy-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: trivy-reader
subjects:
- kind: ServiceAccount
  name: trivy
  namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trivy-notify-script
  namespace: monitoring
data:
  notify.py: |
    import json, subprocess, os, sys

    exit_code = int(open('/report/exit_code').read().strip())
    report = open('/report/output.txt').read()
    webhook = os.environ['DISCORD_WEBHOOK']

    if exit_code == 0:
        print('No fixable HIGH/CRITICAL CVEs found')
        sys.exit(0)

    print('Vulnerabilities found, sending notifications...')

    message = (
        '⚠️ **Weekly CVE Scan** — fixable HIGH/CRITICAL vulnerabilities found\n'
        '```\n' + report[:1700] + '\n```'
    )
    r = subprocess.run(
        ['curl', '-sf', '-X', 'POST', webhook,
         '-H', 'Content-Type: application/json',
         '-d', json.dumps({'content': message})],
        capture_output=True
    )
    if r.returncode != 0:
        print('Discord notification failed', file=sys.stderr)
    else:
        print('Discord notification sent')

    r = subprocess.run(
        ['curl', '-sf', '-X', 'POST', 'http://api.taskmgt.svc.cluster.local:8081/tasks',
         '-H', 'Content-Type: application/json',
         '-d', json.dumps({'text': 'Review CVE scan — fixable HIGH/CRITICAL in cluster !1 #security #cve <cli.cve-scanner'})],
        capture_output=True
    )
    if r.returncode != 0:
        print('tm task creation failed', file=sys.stderr)
    else:
        data = json.loads(r.stdout)
        print('tm task created:', data.get('id', '?'))
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cve-scanner
  namespace: monitoring
spec:
  schedule: "0 7 * * 1"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: trivy
          restartPolicy: OnFailure
          initContainers:
          - name: scan
            image: aquasec/trivy:latest
            command:
            - /bin/sh
            - -c
            - |
              trivy kubernetes \
                --severity HIGH,CRITICAL \
                --ignore-unfixed \
                --disable-node-collector \
                --scanners vuln \
                --report summary \
                --quiet \
                --timeout 20m \
                > /report/output.txt 2>&1
              echo $? > /report/exit_code
              cat /report/output.txt
            volumeMounts:
            - name: report
              mountPath: /report
          containers:
          - name: notify
            image: alpine:latest
            env:
            - name: DISCORD_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: discord-webhook
                  key: address
            command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache --quiet curl python3
              python3 /scripts/notify.py
            volumeMounts:
            - name: report
              mountPath: /report
            - name: scripts
              mountPath: /scripts
          volumes:
          - name: report
            emptyDir: {}
          - name: scripts
            configMap:
              name: trivy-notify-script
