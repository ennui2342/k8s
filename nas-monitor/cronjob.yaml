apiVersion: batch/v1
kind: CronJob
metadata:
  name: nas-raid-monitor
  namespace: monitoring
spec:
  schedule: "*/15 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: monitor
            image: alpine:latest
            command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache --quiet openssh-client python3 curl jq

              mdstat=$(ssh -p 9222 \
                -i /ssh/id_rsa \
                -o StrictHostKeyChecking=no \
                -o BatchMode=yes \
                -o ConnectTimeout=10 \
                ennui2342@192.168.0.76 "cat /proc/mdstat" 2>/dev/null)

              if [ $? -ne 0 ]; then
                echo "Failed to connect to NAS - skipping check"
                exit 0
              fi

              result=$(echo "$mdstat" | python3 -c "import re,sys;m=sys.stdin.read();failed='(F)'in m;pairs=[(x.group(1),len(re.findall(r'\w+\[\d+\]',x.group(0).split('\n')[0])),re.search(r'\[([U_]+)\]',x.group(0)))for x in re.finditer(r'^(md\w+)\s*:(.+?)(?=^md|\Z)',m,re.M|re.S)];degraded=[(n,s.group(1).count('U'),dc)for n,dc,s in pairs if s and s.group(1).count('U')<dc];i=(['Drive(s) marked as failed']if failed else[])+[n+': '+str(u)+'/'+str(dc)+' drives active'for n,u,dc in degraded];print('\n'.join(i));sys.exit(bool(i))")

              if [ $? -eq 1 ]; then
                payload=$(jq -n --arg msg "$result" \
                  '{"content": "🚨 **NAS RAID alert**:\n```\n" + $msg + "\n```"}')
                curl -s -X POST -H "Content-Type: application/json" \
                  -d "$payload" "$DISCORD_WEBHOOK"
                echo "Alert sent: $result"
              else
                echo "RAID healthy"
              fi
            env:
            - name: DISCORD_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: discord-webhook
                  key: address
            volumeMounts:
            - name: ssh-key
              mountPath: /ssh
              readOnly: true
          volumes:
          - name: ssh-key
            secret:
              secretName: nas-ssh-key
              defaultMode: 0600
