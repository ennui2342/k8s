data:
  nas-monitor.json: "{\n  \"id\": 4,\n  \"panels\": [\n    {\n      \"datasource\": null,\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"max\": 100,\n          \"min\": 0,\n          \"unit\": \"percent\"\n        }\n      },\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 12,\n        \"x\": 0,\n        \"y\": 0\n      },\n      \"id\": 1,\n      \"targets\": [\n        {\n          \"datasource\": null,\n          \"query\": \"SELECT mean(\\\"load\\\") FROM \\\"nas_30d\\\".\\\"nas_cpu\\\" WHERE $timeFilter GROUP BY time($__interval) fill(null)\",\n          \"rawQuery\": true,\n          \"refId\": \"A\",\n          \"resultFormat\": \"time_series\"\n        }\n      ],\n      \"title\": \"CPU Load per Core (%)\",\n      \"type\": \"timeseries\"\n    },\n    {\n      \"datasource\": null,\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"max\": 100,\n          \"min\": 0,\n          \"unit\": \"percent\"\n        }\n      },\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 12,\n        \"x\": 12,\n        \"y\": 0\n      },\n      \"id\": 2,\n      \"targets\": [\n        {\n          \"datasource\": null,\n          \"query\": \"SELECT mean(\\\"used\\\") / mean(\\\"size\\\") * 100 FROM \\\"nas_30d\\\".\\\"nas_storage\\\" WHERE \\\"description\\\"='Physical memory' AND $timeFilter GROUP BY time($__interval) fill(null)\",\n          \"rawQuery\": true,\n          \"refId\": \"A\",\n          \"resultFormat\": \"time_series\"\n        }\n      ],\n      \"title\": \"Memory Usage (%)\",\n      \"type\": \"timeseries\"\n    },\n    {\n      \"datasource\": null,\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"max\": 100,\n          \"min\": 0,\n          \"unit\": \"percent\"\n        }\n      },\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 12,\n        \"x\": 0,\n        \"y\": 8\n      },\n      \"id\": 3,\n      \"targets\": [\n        {\n          \"datasource\": null,\n          \"query\": \"SELECT mean(\\\"used\\\") / mean(\\\"size\\\") * 100 FROM \\\"nas_30d\\\".\\\"nas_storage\\\" WHERE \\\"description\\\"='/mnt/md0' AND $timeFilter GROUP BY time($__interval) fill(null)\",\n          \"rawQuery\": true,\n          \"refId\": \"A\",\n          \"resultFormat\": \"time_series\"\n        }\n      ],\n      \"title\": \"/mnt/md0 Disk Usage (%)\",\n      \"type\": \"timeseries\"\n    },\n    {\n      \"datasource\": null,\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"Bps\"\n        },\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"bytes_out\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.transform\",\n                \"value\": \"negative-Y\"\n              }\n            ]\n          }\n        ]\n      },\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 12,\n        \"x\": 12,\n        \"y\": 8\n      },\n      \"id\": 4,\n      \"targets\": [\n        {\n          \"datasource\": null,\n          \"query\": \"SELECT non_negative_derivative(mean(\\\"bytes_in\\\"), 1s) AS \\\"bytes_in\\\", non_negative_derivative(mean(\\\"bytes_out\\\"), 1s) AS \\\"bytes_out\\\" FROM \\\"nas_30d\\\".\\\"nas_network\\\" WHERE \\\"ifname\\\"='eth0' AND $timeFilter GROUP BY time($__interval) fill(null)\",\n          \"rawQuery\": true,\n          \"refId\": \"A\",\n          \"resultFormat\": \"time_series\"\n        }\n      ],\n      \"title\": \"eth0 Network Throughput\",\n      \"type\": \"timeseries\"\n    },\n    {\n      \"datasource\": null,\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"max\": 100,\n          \"min\": 0,\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 70\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 90\n              }\n            ]\n          },\n          \"unit\": \"percent\"\n        }\n      },\n      \"gridPos\": {\n        \"h\": 4,\n        \"w\": 6,\n        \"x\": 0,\n        \"y\": 16\n      },\n      \"id\": 5,\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        }\n      },\n      \"targets\": [\n        {\n          \"datasource\": null,\n          \"query\": \"SELECT last(\\\"used\\\") / last(\\\"size\\\") * 100 FROM \\\"nas_30d\\\".\\\"nas_storage\\\" WHERE \\\"description\\\"='/mnt/md0' AND $timeFilter\",\n          \"rawQuery\": true,\n          \"refId\": \"A\",\n          \"resultFormat\": \"time_series\"\n        }\n      ],\n      \"title\": \"/mnt/md0 Disk Usage (current)\",\n      \"type\": \"gauge\"\n    },\n    {\n      \"datasource\": null,\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"max\": 100,\n          \"min\": 0,\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 70\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 90\n              }\n            ]\n          },\n          \"unit\": \"percent\"\n        }\n      },\n      \"gridPos\": {\n        \"h\": 4,\n        \"w\": 6,\n        \"x\": 6,\n        \"y\": 16\n      },\n      \"id\": 6,\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        }\n      },\n      \"targets\": [\n        {\n          \"datasource\": null,\n          \"query\": \"SELECT last(\\\"used\\\") / last(\\\"size\\\") * 100 FROM \\\"nas_30d\\\".\\\"nas_storage\\\" WHERE \\\"description\\\"='Physical memory' AND $timeFilter\",\n          \"rawQuery\": true,\n          \"refId\": \"A\",\n          \"resultFormat\": \"time_series\"\n        }\n      ],\n      \"title\": \"Memory Usage (current)\",\n      \"type\": \"gauge\"\n    },\n    {\n      \"datasource\": null,\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"max\": 100,\n          \"min\": 0,\n          \"unit\": \"percent\"\n        }\n      },\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 12,\n        \"x\": 12,\n        \"y\": 16\n      },\n      \"id\": 7,\n      \"targets\": [\n        {\n          \"datasource\": null,\n          \"query\": \"SELECT mean(\\\"used\\\") / mean(\\\"size\\\") * 100 FROM \\\"nas_30d\\\".\\\"nas_storage\\\" WHERE $timeFilter GROUP BY time($__interval), \\\"description\\\" fill(null)\",\n          \"rawQuery\": true,\n          \"refId\": \"A\",\n          \"resultFormat\": \"time_series\"\n        }\n      ],\n      \"title\": \"All Storage Usage (%)\",\n      \"type\": \"timeseries\"\n    }\n  ],\n  \"refresh\": \"1m\",\n  \"schemaVersion\": 27,\n  \"time\": {\n    \"from\": \"now-6h\",\n    \"to\": \"now\"\n  },\n  \"timezone\": \"browser\",\n  \"title\": \"NAS Monitor\",\n  \"uid\": \"nas-monitor\",\n  \"version\": 0\n}"
