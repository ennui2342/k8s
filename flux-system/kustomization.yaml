apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- gotk-components.yaml
- gotk-sync.yaml
- taskmgt-image-automation.yaml
- discord-alert.yaml
- discord-webhook-secret.yaml
patches:
- path: gotk-patches.yaml
  target:
    kind: Deployment
    name: kustomize-controller
- patch: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: placeholder
    spec:
      template:
        spec:
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: node-role.kubernetes.io/control-plane
                        operator: DoesNotExist
  target:
    kind: Deployment
- patch: |
    - op: add
      path: /spec/decryption
      value:
        provider: sops
        secretRef:
          name: sops-age
  target:
    kind: Kustomization
    name: flux-system
