---
# Watch ghcr.io/ennui2342/taskmgt-api for new tags
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: taskmgt-api
  namespace: flux-system
spec:
  image: ghcr.io/ennui2342/taskmgt-api
  interval: 5m
---
# Watch ghcr.io/ennui2342/taskmgt-frontend for new tags
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: taskmgt-frontend
  namespace: flux-system
spec:
  image: ghcr.io/ennui2342/taskmgt-frontend
  interval: 5m
---
# Select latest semver tag matching 1.YYYYMMDD.RUNNUMBER pattern
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: taskmgt-api
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: taskmgt-api
  policy:
    semver:
      range: ">=1.0.0"
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: taskmgt-frontend
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: taskmgt-frontend
  policy:
    semver:
      range: ">=1.0.0"
---
# Commit updated image tags back to this repo
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: taskmgt
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: fluxcdbot@users.noreply.github.com
        name: Flux
      messageTemplate: |
        chore: update taskmgt image tags

        {{range .Updated.Images -}}
        - {{.}}
        {{end -}}
    push:
      branch: main
  update:
    path: ./taskmgt
    strategy: Setters
