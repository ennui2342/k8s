apiVersion: v1
kind: PersistentVolume
metadata:
  name: web-data
spec:
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 1Gi
  claimRef:
    name: web-data-web-0
    namespace: default
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-client
  volumeMode: Filesystem
  nfs:
    path: /mnt/md0/k8s/web-data
    server: 192.168.0.76
