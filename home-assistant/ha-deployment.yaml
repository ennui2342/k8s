apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant
  namespace: home-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homeassistant-label
  template:
    metadata:
      labels:
        app: homeassistant-label
    spec:
      hostNetwork: true
      containers:
      - name: homeassistant
        image: homeassistant/home-assistant:2025.6.1
        ports:
          - containerPort: 8123
        resources: {}
        volumeMounts:
          - name: etc-localtime
            mountPath: /etc/localtime
            readOnly: true
          - mountPath: /config
            name: homeassistant-pv-config
      restartPolicy: Always
      volumes:
        - name: etc-localtime
          hostPath:
            path: /usr/share/zoneinfo/Europe/London
        - name: homeassistant-pv-config
          persistentVolumeClaim:
            claimName: homeassistant-pvc-config
status: {}
