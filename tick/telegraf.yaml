apiVersion: v1
kind: ServiceAccount
metadata:
  name: telegraf
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: telegraf
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: telegraf
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: telegraf
subjects:
  - kind: ServiceAccount
    name: telegraf
    namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: telegraf
  namespace: monitoring
data:
  telegraf.conf: |
    [agent]
      interval = "10s"
      round_interval = true
      metric_batch_size = 1000
      metric_buffer_limit = 10000
      collection_jitter = "0s"
      flush_interval = "10s"
      flush_jitter = "0s"
      precision = ""
      hostname = "$HOSTNAME"
      omit_hostname = false

    [[outputs.influxdb]]
      urls = ["http://influxdb.monitoring.svc:8086"]
      database = "telegraf"
      namedrop = ["nas_cpu", "nas_storage", "nas_network"]

    [[outputs.influxdb]]
      urls = ["http://influxdb.monitoring.svc:8086"]
      database = "telegraf"
      retention_policy = "nas_30d"
      namepass = ["nas_cpu", "nas_storage", "nas_network"]

    [[inputs.statsd]]
      service_address = ":8125"
      percentiles = [50, 95, 99]
      metric_separator = "_"
      allowed_pending_messages = 10000
      percentile_limit = 1000

    [[inputs.mqtt_consumer]]
      servers = ["tcp://mosquitto.default:1883"]
      topics = ["weather/loop", "solar/foxess"]
      topic_tag = "topic"
      client_id = "telegraf"
      data_format = "json"

    [[inputs.prometheus]]
      monitor_kubernetes_pods = true
      monitor_kubernetes_pods_namespace = "monitoring"
      kubernetes_label_selector = "app=node-exporter"
      metric_version = 2

    [[inputs.snmp]]
      agents = ["udp://192.168.0.76:161"]
      version = 2
      community = "public"
      interval = "60s"
      name = "nas"

      # CPU load per core (%)
      [[inputs.snmp.table]]
        name = "nas_cpu"
        [[inputs.snmp.table.field]]
          name = "load"
          oid = ".1.3.6.1.2.1.25.3.3.1.2"

      # Storage: RAM, swap, disk volumes
      [[inputs.snmp.table]]
        name = "nas_storage"
        [[inputs.snmp.table.field]]
          name = "description"
          oid = ".1.3.6.1.2.1.25.2.3.1.3"
          is_tag = true
        [[inputs.snmp.table.field]]
          name = "allocation_units"
          oid = ".1.3.6.1.2.1.25.2.3.1.4"
        [[inputs.snmp.table.field]]
          name = "size"
          oid = ".1.3.6.1.2.1.25.2.3.1.5"
        [[inputs.snmp.table.field]]
          name = "used"
          oid = ".1.3.6.1.2.1.25.2.3.1.6"

      # Network interface traffic (64-bit counters) and errors
      [[inputs.snmp.table]]
        name = "nas_network"
        [[inputs.snmp.table.field]]
          name = "ifname"
          oid = ".1.3.6.1.2.1.2.2.1.2"
          is_tag = true
        [[inputs.snmp.table.field]]
          name = "bytes_in"
          oid = ".1.3.6.1.2.1.31.1.1.1.6"
        [[inputs.snmp.table.field]]
          name = "bytes_out"
          oid = ".1.3.6.1.2.1.31.1.1.1.10"
        [[inputs.snmp.table.field]]
          name = "errors_in"
          oid = ".1.3.6.1.2.1.2.2.1.14"
        [[inputs.snmp.table.field]]
          name = "errors_out"
          oid = ".1.3.6.1.2.1.2.2.1.20"
---
apiVersion: v1
kind: Service
metadata:
  name: telegraf
  namespace: monitoring
spec:
  type: ClusterIP
  ports:
  - name: statsd
    port: 8125
    targetPort: 8125
    protocol: UDP
  selector:
    app: telegraf
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegraf
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telegraf
  template:
    metadata:
      labels:
        app: telegraf
    spec:
      serviceAccountName: telegraf
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
      - name: telegraf
        image: telegraf:1.38.3
        env:
        - name: HOSTNAME
          value: telegraf-polling-service
        volumeMounts:
        - name: config
          mountPath: /etc/telegraf
      volumes:
      - name: config
        configMap:
          name: telegraf
