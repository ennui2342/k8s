apiVersion: v1
kind: Service
metadata:
  name: syncthing
  namespace: default
spec:
  selector:
    app: syncthing
  ports:
  - name: web-ui
    port: 8384
    targetPort: 8384
---
apiVersion: v1
kind: Service
metadata:
  name: syncthing-sync
  namespace: default
spec:
  type: NodePort
  selector:
    app: syncthing
  ports:
  - name: sync-tcp
    port: 22000
    targetPort: 22000
    nodePort: 32200
    protocol: TCP
  - name: sync-udp
    port: 22000
    targetPort: 22000
    nodePort: 32200
    protocol: UDP
