apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mdns-repeater-worker
  namespace: default
spec:
  selector:
    matchLabels:
      app: mdns-repeater-worker
  template:
    metadata:
      labels:
        app: mdns-repeater-worker
    spec:
      hostNetwork: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: mdns-repeater
          image: docker.io/monstrenyatko/mdns-repeater:latest
          command: ["/bin/mdns-repeater"]
          args: ["-f", "eth0", "cni0"]
          securityContext:
            privileged: true
      restartPolicy: Always
