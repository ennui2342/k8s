apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: botkube
  namespace: botkube
spec:
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: botkube
      version: "1.x.x"
      sourceRef:
        kind: HelmRepository
        name: botkube
        namespace: botkube
  valuesFrom:
    - kind: Secret
      name: botkube-discord
      valuesKey: values.yaml
  values:
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: DoesNotExist

    analytics:
      disable: true

    settings:
      clusterName: k8s-local
      upgradeNotifier: false

    rbac:
      groups:
        'botkube-flux-ops':
          create: true
          rules:
            - apiGroups:
                - kustomize.toolkit.fluxcd.io
                - helm.toolkit.fluxcd.io
                - source.toolkit.fluxcd.io
                - notification.toolkit.fluxcd.io
                - image.toolkit.fluxcd.io
              resources: ["*"]
              verbs: ["get", "watch", "list", "patch", "update"]

    communications:
      'default-group':
        discord:
          enabled: true
          botID: "1500538696875642931"
          channels:
            'default':
              bindings:
                executors:
                  - k8s-tools
                # sources intentionally omitted — AlertManager owns alerting now

    executors:
      k8s-tools:
        botkube/kubectl:
          enabled: true
          displayName: "Kubectl"
          config:
            defaultNamespace: default
            interactiveBuilder:
              allowed:
                verbs: ["api-resources", "api-versions", "cluster-info", "describe", "explain", "get", "logs", "top"]
                resources: ["pods", "deployments", "statefulsets", "daemonsets", "services", "ingresses", "nodes", "namespaces", "persistentvolumeclaims", "events", "configmaps", "helmreleases", "kustomizations"]
        botkubeExtra/helm:
          enabled: true
          displayName: "Helm"
        botkubeExtra/flux:
          enabled: true
          displayName: "Flux"
          context:
            rbac:
              group:
                type: Static
                static:
                  values:
                    - botkube-flux-ops
                prefix: ""
